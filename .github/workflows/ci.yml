name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install jsonschema pytest matplotlib
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Reproduce benchmarks
        run: python scripts/run_eval.py
      - name: Reproduce SAST benchmark
        run: python scripts/run_appsec.py
      - name: Reproduce DAST benchmark (local mock target)
        run: python scripts/run_dast.py
      - name: Self-scan (report only)
        run: python scripts/scan.py --target ./sentinel --min-severity critical --ci
